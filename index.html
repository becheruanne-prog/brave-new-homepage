document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-size:13px; padding:8px 14px; border:1px solid #e5e5e5; border-radius:5px;\">GoHighLevel<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div data-reveal=\"\" data-d=\"1\"><div class=\"bn-eyebrow\" style=\"margin-bottom:14px;\">Funnels &amp; pages<\u002Fdiv><div style=\"display:flex; flex-wrap:wrap; gap:8px;\"><span style=\"font-family:'Geist Mono',monospace; font-size:13px; padding:8px 14px; border:1px solid #e5e5e5; border-radius:5px;\">GoHighLevel<\u002Fspan><span style=\"font-family:'Geist Mono',monospace; font-size:13px; padding:8px 14px; border:1px solid #e5e5e5; border-radius:5px;\">Webflow<\u002Fspan><span style=\"font-family:'Geist Mono',monospace; font-size:13px; padding:8px 14px; border:1px solid #e5e5e5; border-radius:5px;\">Framer<\u002Fspan><span style=\"font-family:'Geist Mono',monospace; font-size:13px; padding:8px 14px; border:1px solid #e5e5e5; border-radius:5px;\">Unbounce<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div data-reveal=\"\" data-d=\"2\"><div class=\"bn-eyebrow\" style=\"margin-bottom:14px;\">Search &amp; AI visibility<\u002Fdiv><div style=\"display:flex; flex-wrap:wrap; gap:8px;\"><span style=\"font-family:'Geist Mono',monospace; font-size:13px; padding:8px 14px; border:1px solid #e5e5e5; border-radius:5px;\">Semrush<\u002Fspan><span style=\"font-family:'Geist Mono',monospace; font-size:13px; padding:8px 14px; border:1px solid #e5e5e5; border-radius:5px;\">Ubersuggest<\u002Fspan><span style=\"font-family:'Geist Mono',monospace; font-size:13px; padding:8px 14px; border:1px solid #e5e5e5; border-radius:5px;\">Ahrefs<\u002Fspan><span style=\"font-family:'Geist Mono',monospace; font-size:13px; padding:8px 14px; border:1px solid #e5e5e5; border-radius:5px;\">Search Console<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div data-reveal=\"\" data-d=\"2\"><div class=\"bn-eyebrow\" style=\"margin-bottom:14px;\">Conversational &amp; chat<\u002Fdiv><div style=\"display:flex; flex-wrap:wrap; gap:8px;\"><span style=\"font-family:'Geist Mono',monospace; font-size:13px; padding:8px 14px; border:1px solid #e5e5e5; border-radius:5px;\">ManyChat<\u002Fspan><span style=\"font-family:'Geist Mono',monospace; font-size:13px; padding:8px 14px; border:1px solid #e5e5e5; border-radius:5px;\">Intercom<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div data-reveal=\"\" data-d=\"3\"><div class=\"bn-eyebrow\" style=\"margin-bottom:14px;\">Analytics &amp; tracking<\u002Fdiv><div style=\"display:flex; flex-wrap:wrap; gap:8px;\"><span style=\"font-family:'Geist Mono',monospace; font-size:13px; padding:8px 14px; border:1px solid #e5e5e5; border-radius:5px;\">GA4<\u002Fspan><span style=\"font-family:'Geist Mono',monospace; font-size:13px; padding:8px 14px; border:1px solid #e5e5e5; border-radius:5px;\">Segment<\u002Fspan><span style=\"font-family:'Geist Mono',monospace; font-size:13px; padding:8px 14px; border:1px solid #e5e5e5; border-radius:5px;\">Supermetrics<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div data-reveal=\"\" data-d=\"3\"><div class=\"bn-eyebrow\" style=\"margin-bottom:14px;\">Email &amp; distribution<\u002Fdiv><div style=\"display:flex; flex-wrap:wrap; gap:8px;\"><span style=\"font-family:'Geist Mono',monospace; font-size:13px; padding:8px 14px; border:1px solid #e5e5e5; border-radius:5px;\">MailerLite<\u002Fspan><span style=\"font-family:'Geist Mono',monospace; font-size:13px; padding:8px 14px; border:1px solid #e5e5e5; border-radius:5px;\">Mailchimp<\u002Fspan><span style=\"font-family:'Geist Mono',monospace; font-size:13px; padding:8px 14px; background:#D4E820; border:1px solid #D4E820; border-radius:5px; font-weight:500;\">Our own agentic flows<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <p data-reveal=\"\" data-d=\"4\" style=\"margin:44px 0 0; font-weight:500; font-size:clamp(20px,2vw,28px); line-height:1.2; letter-spacing:-0.02em; max-width:26ch;\">If it is in your stack, we make it part of the engine.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ============ 6 — START WHERE IT HURTS ============ -->\n  <section id=\"help\" style=\"max-width: 1440px; margin: 0 auto; padding: clamp(64px,10vh,100px) clamp(20px, 5vw, 56px); border-bottom: 1px solid #e5e5e5;\">\n    <div style=\"max-width:60ch; margin-bottom:44px;\">\n      <div data-reveal=\"\" data-d=\"0\" class=\"bn-eyebrow\" style=\"margin-bottom:20px;\">06 — How we help: start where it hurts<\u002Fdiv>\n      <h2 data-reveal=\"\" data-d=\"1\" style=\"font-weight:500; font-size:clamp(30px,4.4vw,58px); line-height:1.0; letter-spacing:-0.03em; margin:0 0 16px;\">One of these is you.<\u002Fh2>\n      <p data-reveal=\"\" data-d=\"2\" style=\"font-size:clamp(16px,1.35vw,19px); line-height:1.6; color:#404a5a; margin:0;\">The recognition is the brief. Every one of them starts the same way, with the Audit.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns: repeat(auto-fit,minmax(300px,1fr)); gap:1px; background:#e5e5e5; border:1px solid #e5e5e5; border-radius:25px; overflow:hidden;\">\n      <div data-reveal=\"\" data-d=\"1\" style=\"background:#fff; padding:32px 30px;\"><div style=\"font-weight:600; font-size:20px; line-height:1.3; margin-bottom:12px;\">“We are the second name in the room.”<\u002Fdiv><p style=\"margin:0; font-family:'Geist Mono',monospace; font-size:13px; line-height:1.6; color:#808080;\">Your buyers read the peer group first. <span style=\"color:#0a0a0a; background:#D4E820; padding:0 3px;\">We make you the name they say without prompting.<\u002Fspan><\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" data-d=\"2\" style=\"background:#fff; padding:32px 30px;\"><div style=\"font-weight:600; font-size:20px; line-height:1.3; margin-bottom:12px;\">“The machine does not name us.”<\u002Fdiv><p style=\"margin:0; font-family:'Geist Mono',monospace; font-size:13px; line-height:1.6; color:#808080;\">A buyer asks an AI who runs your category and it returns your competitor. <span style=\"color:#0a0a0a; background:#D4E820; padding:0 3px;\">We make you the answer.<\u002Fspan><\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" data-d=\"3\" style=\"background:#fff; padding:32px 30px;\"><div style=\"font-weight:600; font-size:20px; line-height:1.3; margin-bottom:12px;\">“World-class operation, 2019 website.”<\u002Fdiv><p style=\"margin:0; font-family:'Geist Mono',monospace; font-size:13px; line-height:1.6; color:#808080;\">The work is excellent. The surface has not moved in years. <span style=\"color:#0a0a0a; background:#D4E820; padding:0 3px;\">We make the surface match the substance.<\u002Fspan><\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" data-d=\"1\" style=\"background:#fff; padding:32px 30px;\"><div style=\"font-weight:600; font-size:20px; line-height:1.3; margin-bottom:12px;\">“We bought content and got noise.”<\u002Fdiv><p style=\"margin:0; font-family:'Geist Mono',monospace; font-size:13px; line-height:1.6; color:#808080;\">Years and budget spent, inbound worse than before. <span style=\"color:#0a0a0a; background:#D4E820; padding:0 3px;\">We replace volume with one owned position.<\u002Fspan><\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" data-d=\"2\" style=\"background:#fff; padding:32px 30px;\"><div style=\"font-weight:600; font-size:20px; line-height:1.3; margin-bottom:12px;\">“Our best pitch only exists at midnight.”<\u002Fdiv><p style=\"margin:0; font-family:'Geist Mono',monospace; font-size:13px; line-height:1.6; color:#808080;\">A senior partner rewrites the winning deck the night before. <span style=\"color:#0a0a0a; background:#D4E820; padding:0 3px;\">We make that the standard, not the scramble.<\u002Fspan><\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" data-d=\"3\" style=\"background:#0a0a0a; color:#fafafa; padding:32px 30px; display:flex; flex-direction:column; justify-content:center; gap:16px;\"><div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:#808080;\">The one door in<\u002Fdiv><a href=\"#audit\" style=\"display:inline-flex; align-items:center; gap:9px; color:#D4E820; font-weight:500; font-size:20px;\">Book the audit →<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 7 — WHO WE HELP ============ -->\n  <section style=\"max-width: 1440px; margin: 0 auto; padding: clamp(64px,10vh,100px) clamp(20px, 5vw, 56px); border-bottom: 1px solid #e5e5e5;\">\n    <div style=\"max-width:60ch; margin-bottom:44px;\">\n      <div data-reveal=\"\" data-d=\"0\" class=\"bn-eyebrow\" style=\"margin-bottom:20px;\">07 — Who we help<\u002Fdiv>\n      <h2 data-reveal=\"\" data-d=\"1\" style=\"font-weight:500; font-size:clamp(30px,4.4vw,58px); line-height:1.0; letter-spacing:-0.03em; margin:0 0 16px;\">Different rooms. One buyer psychology.<\u002Fh2>\n      <p data-reveal=\"\" data-d=\"2\" style=\"font-size:clamp(16px,1.35vw,19px); line-height:1.6; color:#404a5a; margin:0;\">Operationally or financially excellent. Commercially under-told. Operating where a wrong choice is a career risk.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns: repeat(auto-fit,minmax(280px,1fr)); gap:20px;\">\n      <div data-reveal=\"\" data-d=\"1\" style=\"border:1px solid #e5e5e5; border-radius:25px; padding:34px 30px;\"><div class=\"bn-draw\" style=\"margin-bottom:22px;\"><svg sc-camel-view-box=\"0 0 48 48\" width=\"44\" height=\"44\" fill=\"none\" aria-hidden=\"true\"><rect x=\"6\" y=\"20\" width=\"8\" height=\"22\" stroke=\"#0a0a0a\" stroke-width=\"2\"><\u002Frect><rect x=\"20\" y=\"12\" width=\"8\" height=\"30\" stroke=\"#0a0a0a\" stroke-width=\"2\"><\u002Frect><rect x=\"34\" y=\"6\" width=\"8\" height=\"36\" stroke=\"#D4E820\" stroke-width=\"2.5\"><\u002Frect><\u002Fsvg><\u002Fdiv><div style=\"font-weight:600; font-size:21px; margin-bottom:10px;\">Wealth management &amp; banks<\u002Fdiv><p style=\"margin:0; font-size:15px; line-height:1.55; color:#404a5a;\">Funds, banks, and investment and real estate firms that want to be the name the allocator says first, and the answer the assistant gives.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" data-d=\"2\" style=\"border:1px solid #e5e5e5; border-radius:25px; padding:34px 30px;\"><div class=\"bn-draw\" style=\"margin-bottom:22px;\"><svg sc-camel-view-box=\"0 0 48 48\" width=\"44\" height=\"44\" fill=\"none\" aria-hidden=\"true\"><circle cx=\"14\" cy=\"34\" r=\"6\" stroke=\"#0a0a0a\" stroke-width=\"2\"><\u002Fcircle><circle cx=\"38\" cy=\"34\" r=\"6\" stroke=\"#0a0a0a\" stroke-width=\"2\"><\u002Fcircle><path d=\"M6 14 H26 V34 M26 20 H38 L42 28 V34\" stroke=\"#D4E820\" stroke-width=\"2.5\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-weight:600; font-size:21px; margin-bottom:10px;\">Supply chain &amp; industry<\u002Fdiv><p style=\"margin:0; font-size:15px; line-height:1.55; color:#404a5a;\">Manufacturers, logistics, infrastructure, and AEC, where operational excellence becomes market authority.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" data-d=\"3\" style=\"border:1px solid #e5e5e5; border-radius:25px; padding:34px 30px;\"><div class=\"bn-draw\" style=\"margin-bottom:22px;\"><svg sc-camel-view-box=\"0 0 48 48\" width=\"44\" height=\"44\" fill=\"none\" aria-hidden=\"true\"><circle cx=\"21\" cy=\"21\" r=\"13\" stroke=\"#0a0a0a\" stroke-width=\"2\"><\u002Fcircle><path d=\"M31 31 L42 42\" stroke=\"#0a0a0a\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"21\" cy=\"21\" r=\"4\" fill=\"#D4E820\" stroke=\"#0a0a0a\" stroke-width=\"2\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><div style=\"font-weight:600; font-size:21px; margin-bottom:10px;\">Corporates that need to be found<\u002Fdiv><p style=\"margin:0; font-size:15px; line-height:1.55; color:#404a5a;\">Large organisations that want visibility, want to win the search game, and want brand equity and reputation that move the number.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div data-reveal=\"\" data-d=\"3\" style=\"margin-top:32px;\"><a href=\"#do\" style=\"display:inline-flex; align-items:center; gap:9px; color:#0a0a0a; font-weight:600; font-size:18px; padding:12px 24px; border-radius:9px; background:#ededed; transition:background .15s;\" onmouseover=\"this.style.background='#e3e3e3'\" onmouseout=\"this.style.background='#ededed'\">Read the practices →<\u002Fa><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 8 — WHAT WE DON'T DO (dark) ============ -->\n  <section style=\"background:#0a0a0a; color:#fafafa;\">\n    <div style=\"max-width: 1440px; margin: 0 auto; padding: clamp(72px,12vh,120px) clamp(20px, 5vw, 56px);\">\n      <div style=\"max-width:60ch; margin-bottom:48px;\">\n        <div data-reveal=\"\" data-d=\"0\" class=\"bn-eyebrow\" style=\"margin-bottom:20px;\">08 — What we don't do<\u002Fdiv>\n        <h2 data-reveal=\"\" data-d=\"1\" style=\"font-weight:500; font-size:clamp(28px,4vw,54px); line-height:1.0; letter-spacing:-0.03em; margin:0;\">A brand is defined by what it refuses. So is the way we work.<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns: repeat(auto-fit,minmax(320px,1fr)); gap:0 56px;\">\n        <div data-reveal=\"\" data-d=\"1\" style=\"padding:24px 0; border-top:1px solid #262626;\"><div style=\"font-weight:600; font-size:19px; margin-bottom:8px;\"><span style=\"color:#D4E820;\">×<\u002Fspan> We don't stall.<\u002Fdiv><p style=\"margin:0; font-family:'Geist Mono',monospace; font-size:12.5px; line-height:1.6; color:#a3a3a3;\">No interminable decision cycles, no committee theatre. We move at the speed of a decision-maker, and we need one on your side.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" data-d=\"1\" style=\"padding:24px 0; border-top:1px solid #262626;\"><div style=\"font-weight:600; font-size:19px; margin-bottom:8px;\"><span style=\"color:#D4E820;\">×<\u002Fspan> We don't stay where we are not earning it.<\u002Fdiv><p style=\"margin:0; font-family:'Geist Mono',monospace; font-size:12.5px; line-height:1.6; color:#a3a3a3;\">A signed contract is not a reason to sit in a project that has stopped working. If it is not serving you, we say so and step out.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" data-d=\"2\" style=\"padding:24px 0; border-top:1px solid #262626;\"><div style=\"font-weight:600; font-size:19px; margin-bottom:8px;\"><span style=\"color:#D4E820;\">×<\u002Fspan> We don't tell you what you want to hear.<\u002Fdiv><p style=\"margin:0; font-family:'Geist Mono',monospace; font-size:12.5px; line-height:1.6; color:#a3a3a3;\">If the position is weak, you hear it on day one. You are paying for the truth, not the applause.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" data-d=\"2\" style=\"padding:24px 0; border-top:1px solid #262626;\"><div style=\"font-weight:600; font-size:19px; margin-bottom:8px;\"><span style=\"color:#D4E820;\">×<\u002Fspan> We don't outsource strategy to a tool.<\u002Fdiv><p style=\"margin:0; font-family:'Geist Mono',monospace; font-size:12.5px; line-height:1.6; color:#a3a3a3;\">AI does not set the direction. We hold the reins, and we say so.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" data-d=\"3\" style=\"padding:24px 0; border-top:1px solid #262626;\"><div style=\"font-weight:600; font-size:19px; margin-bottom:8px;\"><span style=\"color:#D4E820;\">×<\u002Fspan> We don't ship templates or slop.<\u002Fdiv><p style=\"margin:0; font-family:'Geist Mono',monospace; font-size:12.5px; line-height:1.6; color:#a3a3a3;\">No borrowed house style, no prompt-default voice, no machine-written filler. Sameness is the thing we exist to remove.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" data-d=\"3\" style=\"padding:24px 0; border-top:1px solid #262626;\"><div style=\"font-weight:600; font-size:19px; margin-bottom:8px;\"><span style=\"color:#D4E820;\">×<\u002Fspan> We don't hype, hedge, or flatter.<\u002Fdiv><p style=\"margin:0; font-family:'Geist Mono',monospace; font-size:12.5px; line-height:1.6; color:#a3a3a3;\">No “in today's rapidly evolving landscape.” No certainty we cannot source.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <p data-reveal=\"\" data-d=\"4\" style=\"margin:44px 0 0; font-size:clamp(17px,1.5vw,22px); line-height:1.5; font-weight:500; max-width:64ch;\">And we say no. If your position is cheapest, if you cannot publish a single audited number, or if the brief is run by committee, we are not for you. <span style=\"color:#D4E820;\">We will tell you in the first ten minutes.<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 9 — IN THEIR WORDS (fluid featured quote, neutral) ============ -->\n  <section style=\"position:relative; overflow:hidden; border-bottom:1px solid #e5e5e5;\">\n    <div style=\"max-width:1440px; margin:0 auto; padding: clamp(64px,10vh,100px) clamp(20px, 5vw, 56px);\">\n      <div data-reveal=\"\" data-d=\"0\" class=\"bn-eyebrow\" style=\"margin-bottom:36px;\">09 — In their words<\u002Fdiv>\n      <!-- featured quote with fluid neutral form bleeding from top-right -->\n      <div style=\"position:relative; min-height: min(64vw, 560px); margin-bottom: 56px;\">\n        <div data-reveal=\"\" data-d=\"1\" style=\"position:absolute; top:-6%; right:-6vw; width:min(58vw,620px); height:min(58vw,620px); pointer-events:none; z-index:0;\">\n          <div style=\"position:absolute; inset:0; border-radius:52% 48% 60% 40% / 46% 58% 42% 54%; background:radial-gradient(58% 58% at 40% 34%, #f4f4f2 0%, #dcdcd6 44%, #a8a8a0 78%, #5c5c56 100%);\"><\u002Fdiv>\n          <div style=\"position:absolute; inset:0; border-radius:52% 48% 60% 40% / 46% 58% 42% 54%; border:1.5px solid rgba(212,232,32,0.6); mix-blend-mode:multiply;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:relative; z-index:1; max-width:56ch; padding-top: clamp(56px,12vw,140px);\">\n          <blockquote data-reveal=\"\" data-d=\"1\" style=\"margin:0 0 40px; font-weight:500; font-size:clamp(26px,3.4vw,50px); line-height:1.14; letter-spacing:-0.02em;\"><span style=\"color:#a8a8a0;\">“<\u002Fspan>Brave New turned our technical edge into demand. The market finally understands why ms:start;\">\n      <div data-reveal=\"\" data-d=\"0\">\n        <div class=\"bn-eyebrow\" style=\"margin-bottom:16px;\">10 — The Business Journal<\u002Fdiv>\n        <h2 style=\"font-weight:500; font-size:clamp(26px,3.2vw,46px); line-height:1.02; letter-spacing:-0.025em; margin:0;\">Every Tuesday, one signal turned into a decision.<\u002Fh2>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-d=\"1\">\n        <p style=\"font-size:clamp(16px,1.35vw,19px); line-height:1.6; color:#404a5a; margin:0 0 32px; max-width:56ch;\">One macro signal translated into a marketing decision, one AI and search shift scored for ninety-day impact, and templates a leadership team can use that week.<\u002Fp>\n        <form onsubmit=\"return false\" style=\"display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px;\">\n          <input type=\"email\" placeholder=\"you@company.com\" aria-label=\"Email address\" style=\"flex:1 1 280px; max-width:360px; padding:13px 20px; border-radius:10px; border:1px solid #e5e5e5; background:#fff; font-size:16px; color:#0a0a0a; font-family:inherit; outline:none;\" onfocus=\"this.style.borderColor='#0a0a0a'\" onblur=\"this.style.borderColor='#e5e5e5'\">\n          <button type=\"submit\" style=\"background:#0a0a0a; color:#fff; font-weight:500; font-size:18px; padding:13px 30px; border:none; border-radius:9px; cursor:pointer; font-family:inherit; transition:all .15s;\" onmouseover=\"this.style.background='#D4E820';this.style.color='#0a0a0a'\" onmouseout=\"this.style.background='#0a0a0a';this.style.color='#fff'\">Subscribe<\u002Fbutton>\n        <\u002Fform>\n        <p style=\"font-family:'Geist Mono',monospace; font-size:12px; color:#808080; margin:0;\">We do not sell, share, or rent the list. Unsubscribe is one click and works the first time.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 11 — FINAL CTA (dark) ============ -->\n  <section id=\"audit\" style=\"position:relative; overflow:hidden; background:#0a0a0a; color:#fafafa;\">\n    <div style=\"position:absolute; bottom:-16vw; left:-8vw; width:min(48vw,600px); height:min(48vw,600px); pointer-events:none;\">\n      <div style=\"position:absolute; inset:0; border-radius:52% 48% 46% 54% / 50% 52% 48% 50%; background:radial-gradient(58% 58% at 42% 36%, #2a2a26 0%, #1a1a17 55%, #0a0a0a 100%);\"><\u002Fdiv>\n      <div style=\"position:absolute; inset:0; border-radius:52% 48% 46% 54% / 50% 52% 48% 50%; border:1.5px solid rgba(212,232,32,0.4);\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:relative; z-index:1; max-width:1440px; margin:0 auto; padding: clamp(72px,13vh,140px) clamp(20px, 5vw, 56px);\">\n      <div style=\"max-width:64ch; margin-bottom:56px;\">\n        <div data-reveal=\"\" data-d=\"0\" class=\"bn-eyebrow\" style=\"margin-bottom:24px;\">11 — Go big before you go home<\u002Fdiv>\n        <p data-reveal=\"\" data-d=\"1\" style=\"font-size:clamp(16px,1.4vw,20px); line-height:1.6; color:#a3a3a3; margin:0 0 20px;\">Most companies have the mindset backwards. They optimise for the dashboard, chase short-term ROI, and shrink their thinking to fit the quarter. A big company that thinks like a small one becomes one.<\u002Fp>\n        <p data-reveal=\"\" data-d=\"2\" style=\"font-size:clamp(16px,1.4vw,20px); line-height:1.6; color:#a3a3a3; margin:0;\">A great idea with no distribution is useless. Great distribution behind a thin idea is worse. You need both: a sharp idea, and the reach to carry it. <span style=\"color:#fafafa;\">AI changed the maths, and strategy keeps the scale from becoming noise.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <h2 data-reveal=\"\" data-d=\"1\" style=\"font-weight:500; font-size:clamp(48px,8vw,132px); line-height:0.92; letter-spacing:-0.04em; margin:0 0 30px;\">Book the audit.<\u002Fh2>\n      <p data-reveal=\"\" data-d=\"2\" style=\"font-size:clamp(18px,1.6vw,24px); line-height:1.45; color:#a3a3a3; margin:0 0 40px; max-width:48ch;\">We send back a one-page verdict before the call. If our read is wrong, you keep it and the fee is refunded.<\u002Fp>\n      <div data-reveal=\"\" data-d=\"3\" style=\"display:flex; flex-wrap:wrap; gap:14px; align-items:center;\">\n        <a href=\"#\" style=\"display:inline-flex; align-items:center; gap:10px; background:#D4E820; color:#0a0a0a; font-weight:600; font-size:18px; padding:15px 34px; border-radius:9px; border:1px solid #D4E820; transition:all .15s;\" onmouseover=\"this.style.background='transparent';this.style.color='#fafafa'\" onmouseout=\"this.style.background='#D4E820';this.style.color='#0a0a0a'\">Book the audit →<\u002Fa>\n        <span style=\"font-family:'Geist Mono',monospace; font-size:13px; color:#808080;\">Talk to us. Don't be a stranger.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <footer style=\"position:relative; z-index:1; max-width:1440px; margin:0 auto; padding:36px clamp(20px, 5vw, 56px) clamp(48px,6vh,72px); border-top:1px solid #262626; display:flex; flex-wrap:wrap; gap:24px 40px; align-items:center; justify-content:space-between;\">\n      <div style=\"font-weight:600; font-size:18px; letter-spacing:-0.03em;\">Brave New<span style=\"color:#0a0a0a; background:#D4E820; padding:0 4px; margin-left:1px; border-radius:3px;\">.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:24px;\">\n        <a href=\"#need\" class=\"bn-eyebrow\" style=\"color:#808080;\">WHAT WE DO<\u002Fa>\n        <a href=\"#help\" class=\"bn-eyebrow\" style=\"color:#808080;\">HOW WE HELP<\u002Fa>\n        <a href=\"#journal\" class=\"bn-eyebrow\" style=\"color:#808080;\">JOURNAL<\u002Fa>\n        <a href=\"#audit\" class=\"bn-eyebrow\" style=\"color:#808080;\">BOOK THE AUDIT<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"font-family:'Geist Mono',monospace; font-size:12px; color:#6b6b6b; flex:1 1 100%;\">EU, UAE, US. © Brave New. Strategy-led growth for high-stakes B2B.<\u002Fdiv>\n    <\u002Ffooter>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() { this._setup(); }\n  componentDidUpdate() { this._setup(); }\n  _setup() {\n    const root = this._root;\n    if (!root) return;\n    const vh = window.innerHeight || document.documentElement.clientHeight || 800;\n    const reveal = (el) => {\n      if (el.getAttribute('data-shown') === '1') return;\n      el.setAttribute('data-shown', '1');\n      const d = parseInt(el.getAttribute('data-d') || '0', 10);\n      el.style.transitionDelay = (d * 80) + 'ms';\n      el.style.opacity = '1';\n      el.style.transform = 'translateY(0)';\n    };\n    if (this._io) this._io.disconnect();\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(e => { if (e.isIntersecting) { reveal(e.target); io.unobserve(e.target); } });\n    }, { threshold: 0.1, rootMargin: '0px 0px -6% 0px' });\n    this._io = io;\n    Array.from(root.querySelectorAll('[data-reveal]')).forEach(el => {\n      if (el.getAttribute('data-shown') === '1') return;\n      el.style.transition = 'opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1)';\n      el.style.willChange = 'opacity, transform';\n      if (el.getBoundingClientRect().top < vh * 0.95) {\n        reveal(el);\n      } else {\n        el.style.opacity = '0';\n        el.style.transform = 'translateY(14px)';\n        io.observe(el);\n      }\n    });\n    if (!this._fallback) this._fallback = setTimeout(() => {\n      const r = this._root; if (!r) return;\n      Array.from(r.querySelectorAll('[data-reveal]')).forEach(reveal);\n    }, 2600);\n  }\n  componentWillUnmount() { if (this._io) this._io.disconnect(); }\n  renderVals() { return { rootRef: (n) => { if (n) this._root = n; } }; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
